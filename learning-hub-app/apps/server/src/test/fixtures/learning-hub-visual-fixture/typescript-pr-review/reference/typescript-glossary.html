<!doctype html>
<html lang="en">
  <head>
    <title>TypeScript Review Glossary</title>
  </head>
  <body>
    <main>
      <h1>TypeScript Review Glossary</h1>
      <dl>
        <dt>Assertion</dt>
        <dd>A promise to the compiler that is not checked at runtime.</dd>
        <dt>Narrowing</dt>
        <dd>Control-flow evidence that reduces the possible type of a value.</dd>
        <dt>Contract drift</dt>
        <dd>A type shape change that silently changes what callers can assume.</dd>
      </dl>
    </main>
  </body>
</html>
