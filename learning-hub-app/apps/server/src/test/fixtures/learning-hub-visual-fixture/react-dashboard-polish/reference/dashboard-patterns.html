  <body>
    <main>
      <h1>Dashboard Pattern Notes</h1>
      <section>
        <h2>Section header</h2>
        <p>Use an icon tile, a short title, an optional count, and a fading rule.</p>
      </section>
      <section>
        <h2>Card CTA</h2>
        <p>Use a quieter action unless the card is the single resume target.</p>
      </section>
    </main>
